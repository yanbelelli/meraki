<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Meraki - Acesse sua conta ou crie uma nova conta">
    <title>Meraki - Minha Conta</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
    <style>
        /* === AUTH PAGE STYLES === */
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--background);
            padding: var(--space-xl);
            position: relative;
            overflow: hidden;
        }

        .auth-page::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(122, 62, 74, 0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .auth-page::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(198, 167, 106, 0.06) 0%, transparent 70%);
            border-radius: 50%;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 1;
        }

        .auth-header {
            text-align: center;
            margin-bottom: var(--space-2xl);
        }

        .auth-logo {
            font-family: var(--font-heading);
            font-size: var(--font-size-3xl);
            font-weight: var(--font-weight-bold);
            color: var(--soft-black);
            letter-spacing: 4px;
            display: inline-flex;
            align-items: center;
            gap: var(--space-sm);
            margin-bottom: var(--space-md);
            text-decoration: none;
        }

        .auth-logo:hover {
            color: var(--wine-rose);
        }

        .auth-header p {
            color: var(--neutral-gray);
            font-size: var(--font-size-base);
        }

        .auth-card {
            background: var(--neutral-white);
            border-radius: var(--radius-2xl);
            padding: var(--space-2xl);
            box-shadow: 0 20px 60px rgba(28, 28, 28, 0.08);
            border: 1px solid rgba(216, 211, 203, 0.3);
        }

        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: var(--space-2xl);
            background: var(--background);
            border-radius: var(--radius-lg);
            padding: 4px;
        }

        .auth-tab {
            flex: 1;
            padding: var(--space-md);
            text-align: center;
            font-weight: var(--font-weight-semibold);
            font-size: var(--font-size-base);
            border-radius: var(--radius-md);
            transition: all var(--transition-base);
            color: var(--neutral-gray);
            cursor: pointer;
        }

        .auth-tab.active {
            background: var(--neutral-white);
            color: var(--wine-rose);
            box-shadow: var(--shadow-sm);
        }

        .auth-tab:hover:not(.active) {
            color: var(--neutral-black);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 300ms ease-out;
        }

        .form-group {
            margin-bottom: var(--space-lg);
        }

        .form-label {
            display: block;
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-semibold);
            color: var(--neutral-gray-dark);
            margin-bottom: var(--space-sm);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: var(--space-md) var(--space-lg);
            border: 1.5px solid var(--neutral-gray-light);
            border-radius: var(--radius-lg);
            font-size: var(--font-size-base);
            color: var(--neutral-black);
            background: var(--neutral-white);
            outline: none;
            transition: all var(--transition-base);
        }

        .form-input::placeholder {
            color: var(--neutral-gray);
        }

        .form-input:focus {
            border-color: var(--wine-rose);
            box-shadow: 0 0 0 3px rgba(122, 62, 74, 0.1);
        }

        .form-input.error {
            border-color: #dc3545;
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.1);
        }

        .form-error {
            font-size: var(--font-size-xs);
            color: #dc3545;
            margin-top: var(--space-xs);
            display: none;
        }

        .form-error.visible {
            display: block;
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: var(--space-md);
            top: 50%;
            transform: translateY(-50%);
            color: var(--neutral-gray);
            padding: var(--space-xs);
            border-radius: var(--radius-sm);
            transition: color var(--transition-base);
        }

        .password-toggle:hover {
            color: var(--wine-rose);
        }

        .password-toggle svg {
            width: 20px;
            height: 20px;
        }

        .auth-submit {
            width: 100%;
            padding: var(--space-md) var(--space-xl);
            background: var(--wine-rose);
            color: var(--neutral-white);
            border: none;
            border-radius: var(--radius-lg);
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-bold);
            cursor: pointer;
            transition: all var(--transition-base);
            margin-top: var(--space-sm);
            position: relative;
            overflow: hidden;
        }

        .auth-submit:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(122, 62, 74, 0.35);
        }

        .auth-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-submit .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--neutral-white);
            border-radius: 50%;
            animation: spin 600ms linear infinite;
            margin: 0 auto;
        }

        .auth-submit.loading .btn-text {
            display: none;
        }

        .auth-submit.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            margin: var(--space-xl) 0;
            color: var(--neutral-gray);
            font-size: var(--font-size-sm);
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--neutral-gray-light);
        }

        .auth-footer {
            text-align: center;
            margin-top: var(--space-xl);
        }

        .auth-footer a {
            color: var(--wine-rose);
            font-weight: var(--font-weight-semibold);
            transition: all var(--transition-base);
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .auth-back {
            display: inline-flex;
            align-items: center;
            gap: var(--space-sm);
            color: var(--neutral-gray);
            font-size: var(--font-size-sm);
            margin-top: var(--space-xl);
            text-align: center;
            width: 100%;
            justify-content: center;
            transition: color var(--transition-base);
        }

        .auth-back:hover {
            color: var(--wine-rose);
        }

        .auth-back svg {
            width: 16px;
            height: 16px;
        }

        /* Alert messages */
        .auth-alert {
            padding: var(--space-md) var(--space-lg);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-lg);
            font-size: var(--font-size-sm);
            display: none;
            animation: fadeIn 300ms ease-out;
        }

        .auth-alert.visible {
            display: block;
        }

        .auth-alert.success {
            background: rgba(37, 211, 102, 0.1);
            color: #1a7a3a;
            border: 1px solid rgba(37, 211, 102, 0.2);
        }

        .auth-alert.error {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            border: 1px solid rgba(220, 53, 69, 0.2);
        }

        /* Logged in state */
        .user-profile {
            display: none;
            animation: fadeIn 300ms ease-out;
        }

        .user-profile.active {
            display: block;
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-lg);
            font-size: var(--font-size-2xl);
            color: var(--neutral-white);
            font-weight: var(--font-weight-bold);
        }

        .user-info {
            text-align: center;
            margin-bottom: var(--space-2xl);
        }

        .user-info h2 {
            font-size: var(--font-size-xl);
            margin-bottom: var(--space-xs);
        }

        .user-info p {
            color: var(--neutral-gray);
            font-size: var(--font-size-sm);
        }

        .profile-actions {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .profile-btn {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-md) var(--space-lg);
            background: var(--background);
            border-radius: var(--radius-lg);
            transition: all var(--transition-base);
            font-size: var(--font-size-base);
            color: var(--neutral-black);
            border: 1px solid transparent;
        }

        .profile-btn:hover {
            background: var(--neutral-white);
            border-color: var(--neutral-gray-light);
            transform: translateX(4px);
        }

        .profile-btn svg {
            width: 20px;
            height: 20px;
            color: var(--wine-rose);
        }

        .profile-btn.danger {
            color: #dc3545;
        }

        .profile-btn.danger svg {
            color: #dc3545;
        }

        .profile-btn.danger:hover {
            background: rgba(220, 53, 69, 0.05);
            border-color: rgba(220, 53, 69, 0.2);
        }

        @media (max-width: 480px) {
            .auth-page {
                padding: var(--space-md);
                align-items: flex-start;
                padding-top: var(--space-2xl);
            }

            .auth-card {
                padding: var(--space-xl);
            }

            .auth-logo {
                font-size: var(--font-size-2xl);
            }
        }
    </style>
</head>

<body>
    <main class="auth-page">
        <div class="auth-container">
            <!-- Header -->
            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor"
                        stroke-width="0.5" opacity="0.8">
                        <path
                            d="M12 3C9.5 3 7.5 4.5 6.8 6.5C6.3 7.8 6.5 9.3 7.3 10.5C6.5 11.7 6.3 13.2 6.8 14.5C7.5 16.5 9.5 18 12 18C14.5 18 16.5 16.5 17.2 14.5C17.7 13.2 17.5 11.7 16.7 10.5C17.5 9.3 17.7 7.8 17.2 6.5C16.5 4.5 14.5 3 12 3Z"
                            fill="currentColor" opacity="0.3" />
                    </svg>
                    MERAKI
                </a>
                <p>Sua conta Meraki</p>
            </div>

            <!-- Auth Card -->
            <div class="auth-card">
                <!-- Alert -->
                <div class="auth-alert" id="authAlert"></div>

                <!-- Tabs (only shown when not logged in) -->
                <div class="auth-tabs" id="authTabs">
                    <button class="auth-tab active" data-tab="login" id="tabLogin">Entrar</button>
                    <button class="auth-tab" data-tab="signup" id="tabSignup">Criar Conta</button>
                </div>

                <!-- Login Form -->
                <form class="auth-form active" id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="loginEmail">E-mail</label>
                        <input type="email" class="form-input" id="loginEmail" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="loginPassword">Senha</label>
                        <div class="password-wrapper">
                            <input type="password" class="form-input" id="loginPassword" placeholder="Sua senha"
                                required>
                            <button type="button" class="password-toggle" aria-label="Mostrar senha"
                                data-target="loginPassword">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="auth-submit" id="loginSubmit">
                        <span class="btn-text">Entrar</span>
                        <div class="spinner"></div>
                    </button>
                </form>

                <!-- Signup Form -->
                <form class="auth-form" id="signupForm">
                    <div class="form-group">
                        <label class="form-label" for="signupName">Nome Completo</label>
                        <input type="text" class="form-input" id="signupName" placeholder="Seu nome completo" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="signupEmail">E-mail</label>
                        <input type="email" class="form-input" id="signupEmail" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="signupPassword">Senha</label>
                        <div class="password-wrapper">
                            <input type="password" class="form-input" id="signupPassword"
                                placeholder="Mínimo 6 caracteres" required minlength="6">
                            <button type="button" class="password-toggle" aria-label="Mostrar senha"
                                data-target="signupPassword">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="signupPasswordConfirm">Confirmar Senha</label>
                        <div class="password-wrapper">
                            <input type="password" class="form-input" id="signupPasswordConfirm"
                                placeholder="Confirme sua senha" required minlength="6">
                            <button type="button" class="password-toggle" aria-label="Mostrar senha"
                                data-target="signupPasswordConfirm">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>
                        <p class="form-error" id="passwordMatchError">As senhas não coincidem</p>
                    </div>
                    <button type="submit" class="auth-submit" id="signupSubmit">
                        <span class="btn-text">Criar Conta</span>
                        <div class="spinner"></div>
                    </button>
                </form>

                <!-- User Profile (shown when logged in) -->
                <div class="user-profile" id="userProfile">
                    <div class="user-avatar" id="userAvatar">M</div>
                    <div class="user-info">
                        <h2 id="userName">Usuário</h2>
                        <p id="userEmail">email@email.com</p>
                    </div>
                    <div class="profile-actions">
                        <a href="index.html" class="profile-btn">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

                            </svg>
                            Ir para a Loja
                        </a>
                        <a href="admin.html" class="profile-btn" id="adminLink" style="display: none;">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            Painel Administrativo
                        </a>
                        <button class="profile-btn danger" id="logoutBtn">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                            </svg>
                            Sair da Conta
                        </button>
                    </div>
                </div>
            </div>

            <!-- Back to Store -->
            <a href="index.html" class="auth-back">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
                Voltar para a loja
            </a>
        </div>
    </main>

    <!-- Supabase CDN -->
    <script src="supabase-client.js"></script>
    <script src="supabase.js"></script>
    <script>
        // === AUTH PAGE LOGIC ===
        const authTabs = document.getElementById('authTabs');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const userProfile = document.getElementById('userProfile');
        const authAlert = document.getElementById('authAlert');

        // Tab switching
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.tab;
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                loginForm.classList.toggle('active', target === 'login');
                signupForm.classList.toggle('active', target === 'signup');
                hideAlert();
            });
        });

        // Password visibility toggle
        document.querySelectorAll('.password-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
                btn.innerHTML = isPassword ? `
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                    </svg>
                ` : `
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>
                `;
            });
        });

        // Show/hide alert
        function showAlert(message, type = 'error') {
            authAlert.textContent = message;
            authAlert.className = `auth-alert visible ${type}`;
        }

        function hideAlert() {
            authAlert.className = 'auth-alert';
        }

        // Set button loading state
        function setLoading(btn, loading) {
            if (loading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // Login handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const submitBtn = document.getElementById('loginSubmit');

            if (typeof MerakiAuth === 'undefined') {
                showAlert('Erro interno: O cliente do banco de dados não foi carregado. Verifique se você está acessando a página via Live Server e não pelo diretório do computador (file://).', 'error');
                return;
            }

            setLoading(submitBtn, true);

            try {
                const { data, error } = await MerakiAuth.signIn(email, password);

                setLoading(submitBtn, false);

                if (error) {
                    let msg = 'Erro ao fazer login.';
                    if (error.message.includes('Invalid login credentials')) {
                        msg = 'E-mail ou senha incorretos.';
                    } else if (error.message.includes('Email not confirmed')) {
                        msg = 'Verifique seu e-mail para confirmar sua conta.';
                    }
                    showAlert(msg, 'error');
                } else {
                    showAlert('Login realizado com sucesso!', 'success');
                    setTimeout(() => showUserProfile(data.session), 500);
                }
            } catch (err) {
                setLoading(submitBtn, false);
                console.error(err);
                showAlert('Erro crítico: ' + err.message, 'error');
            }
        });

        // Signup handler
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupPasswordConfirm').value;
            const submitBtn = document.getElementById('signupSubmit');
            const errorEl = document.getElementById('passwordMatchError');

            if (typeof MerakiAuth === 'undefined') {
                showAlert('Erro interno: O cliente do banco de dados não foi carregado. Acesse via Live Server.', 'error');
                return;
            }

            // Validate passwords match
            if (password !== confirmPassword) {
                errorEl.classList.add('visible');
                document.getElementById('signupPasswordConfirm').classList.add('error');
                return;
            } else {
                errorEl.classList.remove('visible');
                document.getElementById('signupPasswordConfirm').classList.remove('error');
            }

            setLoading(submitBtn, true);

            try {
                const { data, error } = await MerakiAuth.signUp(email, password, name);

                setLoading(submitBtn, false);

                if (error) {
                    let msg = 'Erro ao criar conta.';
                    if (error.message.includes('already registered')) {
                        msg = 'Este e-mail já está cadastrado.';
                    } else if (error.message.includes('Password')) {
                        msg = 'A senha deve ter pelo menos 6 caracteres.';
                    }
                    showAlert(msg, 'error');
                } else {
                    if (data.session) {
                        showAlert('Conta criada com sucesso!', 'success');
                        setTimeout(() => showUserProfile(data.session), 500);
                    } else {
                        showAlert('Conta criada! Verifique seu e-mail para confirmar.', 'success');
                    }
                }
            } catch (err) {
                setLoading(submitBtn, false);
                console.error(err);
                showAlert('Erro crítico: ' + err.message, 'error');
            }
        });

        // Show user profile
        async function showUserProfile(session) {
            if (!session) return;

            authTabs.style.display = 'none';
            loginForm.classList.remove('active');
            signupForm.classList.remove('active');
            userProfile.classList.add('active');
            hideAlert();

            const user = session.user;
            const name = user.user_metadata?.full_name || 'Usuário';
            const email = user.email;
            const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);

            document.getElementById('userAvatar').textContent = initials;
            document.getElementById('userName').textContent = name;
            document.getElementById('userEmail').textContent = email;

            // Show admin link if admin
            const isAdmin = await MerakiAuth.isAdmin();
            document.getElementById('adminLink').style.display = isAdmin ? 'flex' : 'none';
        }

        // Logout handler
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await MerakiAuth.signOut();
            userProfile.classList.remove('active');
            authTabs.style.display = 'flex';
            loginForm.classList.add('active');
            document.getElementById('tabLogin').classList.add('active');
            document.getElementById('tabSignup').classList.remove('active');
            showAlert('Você saiu da conta.', 'success');
        });

        // Check if already logged in on page load
        (async () => {
            if (typeof MerakiAuth === 'undefined') return;
            try {
                const { session } = await MerakiAuth.getSession();
                if (session) {
                    showUserProfile(session);
                }
            } catch (err) {
                console.error(err);
            }
        })();
    </script>
</body>

</html>
